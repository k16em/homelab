---
- name: '必要なパッケージを追加する'
  become: true
  community.general.pacman:
    name: '{{ item.name }}'
    state: installed
  with_items: '{{ required_packages }}'

- name: '必要なAURパッケージを追加する'
  kewlfft.aur.aur:
    name: '{{ item.name }}'
    state: present
  with_items: '{{ required_aur_packages }}'

- name: 'llmグループを作成する'
  become: true
  ansible.builtin.group:
    name: llm
    state: present

- name: 'llm用のユーザを作成する'
  become: true
  ansible.builtin.user:
    name: llm
    shell: /usr/bin/zsh
    groups: llm,docker
    append: yes
    password: "{{ vault_maintainer_password | password_hash('sha512') }}"

- name: 'systemd用ディレクトリを掘る'
  become: true
  become_user: llm
  ansible.builtin.file:
    path: ~/.config/systemd/user
    state: "directory"
    recurse: true
    owner: llm
    mode: '0755'

- name: 'モデル用ディレクトリを掘る'
  become: true
  become_user: llm
  ansible.builtin.file:
    path: ~/models
    state: "directory"
    recurse: true
    owner: llm
    mode: '0755'

